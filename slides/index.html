<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Présentations — Outils d'Enseignement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-md: 0 16px 48px rgba(2, 6, 23, 0.25);
            --shadow-sm: 0 8px 26px rgba(2, 6, 23, 0.14);
        }

        [data-theme="dark"] {
            --bg: #0a0f1f;
            --bg-grad-a: #101b3a;
            --bg-grad-b: #1a1240;
            --panel: rgba(17, 24, 39, 0.72);
            --card: #151d31;
            --card-2: #10182a;
            --surface: #1b2439;
            --text: #d2dbeb;
            --heading: #eef2ff;
            --muted: #8fa0bf;
            --border: #2d3b59;
            --primary: #7c9cff;
            --primary-strong: #6285ff;
            --primary-soft: rgba(124, 156, 255, 0.12);
            --success: #34d399;
            --warning: #f59e0b;
            --danger: #f87171;
            --overlay: rgba(3, 7, 18, 0.6);
            --cover-text: #ffffff;
        }

        [data-theme="light"] {
            --bg: #f4f7ff;
            --bg-grad-a: #e9f1ff;
            --bg-grad-b: #f7efff;
            --panel: rgba(255, 255, 255, 0.82);
            --card: #ffffff;
            --card-2: #f8faff;
            --surface: #eef2ff;
            --text: #24324a;
            --heading: #111827;
            --muted: #64748b;
            --border: #dbe5f5;
            --primary: #4f6df5;
            --primary-strong: #3f5ce4;
            --primary-soft: rgba(79, 109, 245, 0.1);
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --overlay: rgba(15, 23, 42, 0.28);
            --cover-text: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: var(--font);
            color: var(--text);
            background:
                radial-gradient(circle at 12% 6%, var(--bg-grad-a), transparent 42%),
                radial-gradient(circle at 88% 14%, var(--bg-grad-b), transparent 40%),
                var(--bg);
            line-height: 1.5;
            min-height: 100vh;
        }

        .index-shell {
            width: min(1200px, 100% - 2rem);
            margin: 0 auto;
            padding: 1.4rem 0 2.4rem;
        }

        .hero {
            border: 1px solid var(--border);
            border-radius: 22px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
            padding: 1rem 1rem 1.1rem;
            margin-bottom: 1.25rem;
        }

        .hero-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            text-decoration: none;
            color: var(--muted);
            font-size: 0.78rem;
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 0.33rem 0.62rem;
            transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .back-link:hover {
            color: var(--primary);
            border-color: color-mix(in srgb, var(--primary) 36%, var(--border));
            background: var(--primary-soft);
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .theme-toggle:hover {
            color: var(--primary);
            border-color: color-mix(in srgb, var(--primary) 40%, var(--border));
            background: var(--primary-soft);
        }

        .hero-main {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
        }

        .hero-title-wrap {
            min-width: 280px;
            flex: 1;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid color-mix(in srgb, var(--primary) 45%, var(--border));
            border-radius: 999px;
            color: var(--primary);
            background: var(--primary-soft);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.24rem 0.6rem;
            margin-bottom: 0.6rem;
        }

        .hero h1 {
            margin: 0;
            color: var(--heading);
            font-size: clamp(1.35rem, 1.9vw, 2rem);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }

        .hero p {
            margin: 0.45rem 0 0;
            color: var(--muted);
            max-width: 72ch;
            font-size: 0.86rem;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.62rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            text-decoration: none;
            border-radius: 11px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.6rem 0.95rem;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: color-mix(in srgb, var(--primary) 68%, var(--border));
            box-shadow: 0 8px 22px color-mix(in srgb, var(--primary) 34%, transparent);
        }

        .btn-primary:hover {
            background: var(--primary-strong);
            transform: translateY(-1px);
        }

        .btn-secondary {
            color: var(--text);
            background: var(--card);
        }

        .btn-secondary:hover {
            color: var(--primary);
            border-color: color-mix(in srgb, var(--primary) 38%, var(--border));
            background: var(--primary-soft);
        }

        .panel {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, color-mix(in srgb, var(--card) 85%, transparent), var(--card));
            box-shadow: var(--shadow-sm);
            margin-top: 1rem;
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.88rem 1rem;
            border-bottom: 1px solid var(--border);
            background: color-mix(in srgb, var(--card-2) 88%, transparent);
        }

        .panel-head h2 {
            margin: 0;
            color: var(--heading);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .panel-head .meta {
            font-size: 0.74rem;
            color: var(--muted);
        }

        .panel-body {
            padding: 1rem;
        }

        .pres-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.86rem;
        }

        .pres-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--card-2);
            overflow: hidden;
            transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
        }

        .pres-card:hover {
            border-color: color-mix(in srgb, var(--primary) 42%, var(--border));
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .pres-cover {
            height: 104px;
            border-bottom: 1px solid color-mix(in srgb, var(--border) 74%, transparent);
            background: linear-gradient(140deg, color-mix(in srgb, var(--cover, var(--primary)) 90%, #0f172a), color-mix(in srgb, var(--cover, var(--primary)) 36%, #020617));
            color: var(--cover-text);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0.78rem 0.88rem;
            position: relative;
            overflow: hidden;
        }

        .pres-cover::after {
            content: '';
            position: absolute;
            right: -34px;
            top: -34px;
            width: 118px;
            height: 118px;
            border-radius: 50%;
            background: color-mix(in srgb, #ffffff 15%, transparent);
            pointer-events: none;
        }

        .cover-kicker {
            font-size: 0.64rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.92;
        }

        .cover-icon {
            width: 18px;
            height: 18px;
            opacity: 0.96;
            z-index: 1;
        }

        .pres-content {
            padding: 0.78rem 0.86rem 0.86rem;
        }

        .pres-title {
            margin: 0;
            color: var(--heading);
            font-size: 0.9rem;
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        .pres-meta {
            margin-top: 0.44rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.38rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.67rem;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.2rem 0.48rem;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
        }

        .chip svg {
            width: 11px;
            height: 11px;
            opacity: 0.9;
        }

        .pres-actions {
            margin-top: 0.72rem;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.45rem;
        }

        .card-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            border: 1px solid var(--border);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.45rem 0.56rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .card-btn:hover {
            border-color: color-mix(in srgb, var(--primary) 42%, var(--border));
            color: var(--primary);
            background: var(--primary-soft);
        }

        .card-btn.primary {
            background: var(--primary-soft);
            color: var(--primary);
            border-color: color-mix(in srgb, var(--primary) 40%, var(--border));
        }

        .card-btn.warn {
            color: var(--danger);
        }

        .card-btn.warn:hover {
            border-color: color-mix(in srgb, var(--danger) 48%, var(--border));
            background: color-mix(in srgb, var(--danger) 10%, transparent);
            color: var(--danger);
        }

        .draft-banner {
            border: 1px solid color-mix(in srgb, var(--warning) 42%, var(--border));
            border-radius: var(--radius-md);
            background: color-mix(in srgb, var(--warning) 10%, var(--card));
            padding: 0.72rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.72rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .draft-banner .draft-text {
            flex: 1;
            min-width: 260px;
            font-size: 0.78rem;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
        }

        .draft-banner .draft-actions {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }

        .empty-state {
            border: 1px dashed var(--border);
            border-radius: 14px;
            background: color-mix(in srgb, var(--surface) 76%, transparent);
            padding: 1rem;
            color: var(--muted);
            font-size: 0.8rem;
            text-align: center;
        }

        .empty-state strong {
            color: var(--heading);
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.84rem;
        }

        @media (max-width: 760px) {
            .index-shell { width: min(1200px, 100% - 1.1rem); }
            .hero { padding: 0.85rem 0.8rem 0.95rem; }
            .hero-actions { width: 100%; }
            .hero-actions .btn { flex: 1; }
            .panel-head { padding: 0.75rem 0.82rem; }
            .panel-body { padding: 0.82rem; }
            .pres-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="index-shell">
    <header class="hero">
        <div class="hero-top">
            <a href="../index.html" class="back-link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                Retour au catalogue
            </a>
            <button class="theme-toggle" id="btn-toggle-theme" title="Basculer thème clair/sombre" aria-label="Basculer thème clair/sombre">
                <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
            </button>
        </div>

        <div class="hero-main">
            <div class="hero-title-wrap">
                <span class="hero-badge">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 20h8"/></svg>
                    Slides
                </span>
                <h1>Index des présentations</h1>
                <p>Accède rapidement aux exemples, reprends un brouillon et relance tes dernières présentations locales.</p>
            </div>
            <div class="hero-actions">
                <a href="editor.html" class="btn btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Nouvelle présentation
                </a>
                <button class="btn btn-secondary" id="btn-open-file" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5z"/></svg>
                    Ouvrir un fichier JSON
                </button>
            </div>
        </div>
    </header>

    <div id="draft-notice"></div>

    <section class="panel" aria-labelledby="examples-title">
        <div class="panel-head">
            <h2 id="examples-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
                Exemples inclus
            </h2>
            <span class="meta" id="examples-count"></span>
        </div>
        <div class="panel-body">
            <div class="pres-grid" id="examples-grid"></div>
        </div>
    </section>

    <section class="panel" aria-labelledby="local-title">
        <div class="panel-head">
            <h2 id="local-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18"/><path d="M3 12h18"/><path d="M3 17h18"/></svg>
                Mes présentations locales
            </h2>
            <span class="meta" id="local-count"></span>
        </div>
        <div class="panel-body" id="local-grid"></div>
    </section>
</div>

<script src="../shared/slides/storage.js?v=2"></script>
<script src="../shared/slides/background-utils.js?v=1"></script>
<script src="../shared/slides/slides-core.js?v=15"></script>
<script src="../shared/slides/editor-dialog.js"></script>
<script>
    const Storage = window.OEIStorage || null;

    const storageGetRaw = key => {
        if (!key) return null;
        if (Storage?.getRaw) return Storage.getRaw(key);
        try { return localStorage.getItem(key); } catch (e) { return null; }
    };
    const storageSetRaw = (key, value) => {
        if (!key) return false;
        if (Storage?.setRaw) return Storage.setRaw(key, value);
        try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
    };
    const storageRemove = key => {
        if (!key) return;
        if (Storage?.remove) Storage.remove(key);
        else localStorage.removeItem(key);
    };
    const storageGetJSON = (key, fallback = []) => {
        if (!key) return fallback;
        if (Storage?.getJSON) return Storage.getJSON(key, fallback);
        try {
            const raw = localStorage.getItem(key);
            if (!raw) return fallback;
            return JSON.parse(raw);
        } catch (e) {
            return fallback;
        }
    };
    const storageSetJSON = (key, value) => {
        if (!key) return false;
        if (Storage?.setJSON) return Storage.setJSON(key, value);
        try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (e) { return false; }
    };

    const EDITOR_THEME_KEY = Storage?.KEYS?.EDITOR_THEME || 'oei-editor-theme';
    const DRAFT_KEY = Storage?.KEYS?.PRESENT_DATA || 'oei-slide-present-data';
    const LOCAL_KEY = Storage?.KEYS?.SLIDE_LIBRARY || 'oei-slide-library';
    const RECENT_KEY = Storage?.KEYS?.RECENT_PRESENTATIONS || 'oei-recent-presentations';

    const EXAMPLES = [
        { file: '../data/slides/exemple-git.json', title: 'GitHub Actions — Introduction', slides: 10, theme: 'dark', topic: 'CI/CD', icon: 'flow' },
        { file: '../data/slides/demo-complete.json', title: 'Démo complète — Tous les types', slides: 24, theme: 'icom', topic: 'Complet', icon: 'lab' },
    ];

    let _localDecks = [];

    function icon(name) {
        const icons = {
            flow: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="6" height="4" rx="1"/><rect x="15" y="4" width="6" height="4" rx="1"/><rect x="9" y="16" width="6" height="4" rx="1"/><path d="M6 8v4h12V8"/><path d="M12 12v4"/></svg>',
            lab: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2v6l-5 8a3 3 0 0 0 2.6 4.5h8.8A3 3 0 0 0 19 16l-5-8V2"/><path d="M8 12h8"/></svg>',
            slide: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8"/><path d="M12 16v4"/></svg>',
            play: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="9 7 17 12 9 17 9 7"/></svg>',
            edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>',
            trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
            clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg>',
            count: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="6" x2="21" y2="6"/><line x1="7" y1="12" x2="21" y2="12"/><line x1="7" y1="18" x2="21" y2="18"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>',
            draft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8"/><path d="M8 12h8"/><path d="M8 16h5"/></svg>',
            sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>',
        };
        return icons[name] || icons.slide;
    }

    function initTheme() {
        const saved = storageGetRaw(EDITOR_THEME_KEY) || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon(saved);
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        storageSetRaw(EDITOR_THEME_KEY, next);
        updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
        document.getElementById('icon-sun').style.display = theme === 'dark' ? '' : 'none';
        document.getElementById('icon-moon').style.display = theme === 'light' ? '' : 'none';
    }

    function themeColor(id) {
        const fallback = '#4f6df5';
        const builtIn = (window.SlidesThemes?.BUILT_IN || {})[id] || (window.SlidesThemes?.BUILT_IN || {}).dark;
        return builtIn?.colors?.slideBg || fallback;
    }

    function readRecentDecks() {
        const recents = storageGetJSON(RECENT_KEY, []);
        if (!Array.isArray(recents)) return [];
        return recents
            .filter(r => r && typeof r.data === 'string' && r.data.trim())
            .map((r, idx) => ({
                source: 'recent',
                sourceIndex: idx,
                title: String(r.title || 'Présentation sans titre'),
                date: String(r.date || ''),
                slideCount: Number(r.slideCount) || 0,
                rawData: r.data,
            }));
    }

    function readLibraryDecks() {
        const library = storageGetJSON(LOCAL_KEY, []);
        if (!Array.isArray(library)) return [];
        return library
            .map((r, idx) => {
                if (!r) return null;
                const rawData = typeof r.data === 'string'
                    ? r.data
                    : (r.deck ? JSON.stringify(r.deck) : '');
                if (!rawData) return null;
                const title = String(r.title || r.metadata?.title || 'Présentation locale');
                const date = String(r.date || r.modified || '');
                const slideCount = Number(r.slideCount) || Number(r.metadata?.slides) || 0;
                return {
                    source: 'library',
                    sourceIndex: idx,
                    title,
                    date,
                    slideCount,
                    rawData,
                };
            })
            .filter(Boolean);
    }

    function loadLocalDecks() {
        const seen = new Set();
        const merged = [];
        const add = entry => {
            const key = `${entry.title}::${entry.slideCount}`;
            if (seen.has(key)) return;
            seen.add(key);
            merged.push(entry);
        };
        readRecentDecks().forEach(add);
        readLibraryDecks().forEach(add);
        return merged;
    }

    function openViewerFile(file) {
        window.open('viewer.html?file=' + encodeURIComponent(file), '_blank');
    }

    function openEditorFile(file) {
        location.href = 'editor.html?file=' + encodeURIComponent(file);
    }

    function openDeckFromLocal(idx, mode) {
        const deck = _localDecks[idx];
        if (!deck || !deck.rawData) return;
        storageSetRaw(DRAFT_KEY, deck.rawData);
        if (mode === 'viewer') {
            window.open('viewer.html?file=__draft__', '_blank');
            return;
        }
        location.href = 'editor.html';
    }

    async function removeLocalDeck(idx) {
        const deck = _localDecks[idx];
        if (!deck) return;
        const ok = await OEIDialog.confirm('Retirer cette entrée locale ?', { danger: true });
        if (!ok) return;

        if (deck.source === 'recent') {
            const recents = storageGetJSON(RECENT_KEY, []);
            if (Array.isArray(recents) && recents[deck.sourceIndex]) {
                recents.splice(deck.sourceIndex, 1);
                storageSetJSON(RECENT_KEY, recents);
            }
        } else if (deck.source === 'library') {
            const library = storageGetJSON(LOCAL_KEY, []);
            if (Array.isArray(library) && library[deck.sourceIndex]) {
                library.splice(deck.sourceIndex, 1);
                storageSetJSON(LOCAL_KEY, library);
            }
        }

        _localDecks = loadLocalDecks();
        renderLocalDecks();
    }

    function renderExamples() {
        const grid = document.getElementById('examples-grid');
        document.getElementById('examples-count').textContent = `${EXAMPLES.length} exemple${EXAMPLES.length > 1 ? 's' : ''}`;
        grid.innerHTML = EXAMPLES.map((p, idx) => `
            <article class="pres-card">
                <div class="pres-cover" style="--cover:${themeColor(p.theme)}">
                    <span class="cover-kicker">${p.topic}</span>
                    <span class="cover-icon" aria-hidden="true">${icon(p.icon)}</span>
                </div>
                <div class="pres-content">
                    <h3 class="pres-title">${p.title}</h3>
                    <div class="pres-meta">
                        <span class="chip">${icon('count')} ${p.slides} slides</span>
                        <span class="chip">${icon('slide')} ${p.theme}</span>
                    </div>
                    <div class="pres-actions">
                        <button type="button" class="card-btn primary" data-action="present-example" data-example-index="${idx}">${icon('play')} Présenter</button>
                        <button type="button" class="card-btn" data-action="edit-example" data-example-index="${idx}">${icon('edit')} Éditer</button>
                    </div>
                </div>
            </article>
        `).join('');
    }

    function renderDraftNotice() {
        const raw = storageGetRaw(DRAFT_KEY);
        const host = document.getElementById('draft-notice');
        if (!raw) {
            host.innerHTML = '';
            return;
        }
        try {
            const data = JSON.parse(raw);
            const title = data.metadata?.title || 'Présentation sans titre';
            const modified = data.metadata?.modified || '';
            const slideCount = data.slides?.length || 0;
            host.innerHTML = `
                <div class="draft-banner">
                    <span class="draft-text">${icon('draft')} Brouillon actif: <strong>${title}</strong> (${slideCount} slides)${modified ? ` — ${modified}` : ''}</span>
                    <div class="draft-actions">
                        <button type="button" class="card-btn" data-action="resume-draft">${icon('edit')} Reprendre</button>
                        <button type="button" class="card-btn warn" data-action="drop-draft">${icon('trash')} Supprimer</button>
                    </div>
                </div>
            `;
        } catch (e) {
            host.innerHTML = '';
        }
    }

    function renderLocalDecks() {
        const host = document.getElementById('local-grid');
        document.getElementById('local-count').textContent = `${_localDecks.length} entrée${_localDecks.length > 1 ? 's' : ''}`;

        if (!_localDecks.length) {
            host.innerHTML = `
                <div class="empty-state">
                    <strong>Aucune présentation locale</strong>
                    Crée une présentation, exporte-la, ou ouvre un fichier <code>.json</code> pour commencer.
                </div>
            `;
            return;
        }

        host.innerHTML = `<div class="pres-grid">${_localDecks.map((deck, idx) => `
            <article class="pres-card">
                <div class="pres-cover" style="--cover:${themeColor('dark')}">
                    <span class="cover-kicker">${deck.source === 'recent' ? 'Récente' : 'Bibliothèque'}</span>
                    <span class="cover-icon" aria-hidden="true">${icon('slide')}</span>
                </div>
                <div class="pres-content">
                    <h3 class="pres-title">${deck.title}</h3>
                    <div class="pres-meta">
                        <span class="chip">${icon('count')} ${deck.slideCount || '?'} slides</span>
                        <span class="chip">${icon('clock')} ${deck.date || 'date inconnue'}</span>
                    </div>
                    <div class="pres-actions">
                        <button type="button" class="card-btn primary" data-action="present-local" data-local-index="${idx}">${icon('play')} Présenter</button>
                        <button type="button" class="card-btn" data-action="edit-local" data-local-index="${idx}">${icon('edit')} Éditer</button>
                    </div>
                    <div class="pres-actions" style="grid-template-columns: 1fr; margin-top: 0.45rem;">
                        <button type="button" class="card-btn warn" data-action="remove-local" data-local-index="${idx}">${icon('trash')} Retirer de la liste</button>
                    </div>
                </div>
            </article>
        `).join('')}</div>`;
    }

    async function discardDraft() {
        const ok = await OEIDialog.confirm('Supprimer le brouillon ?', { danger: true });
        if (!ok) return;
        storageRemove(DRAFT_KEY);
        renderDraftNotice();
    }

    function onOpenFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async e => {
            try {
                const file = e.target.files?.[0];
                if (!file) return;
                const text = await file.text();
                const data = JSON.parse(text);
                if (!Array.isArray(data.slides)) throw new Error('Format invalide');
                storageSetRaw(DRAFT_KEY, text);
                location.href = 'editor.html';
            } catch (err) {
                await OEIDialog.alert('Erreur : ' + (err?.message || 'fichier invalide'));
            }
        };
        input.click();
    }

    document.getElementById('btn-toggle-theme').addEventListener('click', toggleTheme);
    document.getElementById('btn-open-file').addEventListener('click', onOpenFile);

    document.addEventListener('click', e => {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;
        const exampleIdx = Number(target.dataset.exampleIndex);
        const localIdx = Number(target.dataset.localIndex);

        if (action === 'present-example' && Number.isFinite(exampleIdx) && EXAMPLES[exampleIdx]) {
            openViewerFile(EXAMPLES[exampleIdx].file);
            return;
        }
        if (action === 'edit-example' && Number.isFinite(exampleIdx) && EXAMPLES[exampleIdx]) {
            openEditorFile(EXAMPLES[exampleIdx].file);
            return;
        }
        if (action === 'present-local' && Number.isFinite(localIdx)) {
            openDeckFromLocal(localIdx, 'viewer');
            return;
        }
        if (action === 'edit-local' && Number.isFinite(localIdx)) {
            openDeckFromLocal(localIdx, 'editor');
            return;
        }
        if (action === 'remove-local' && Number.isFinite(localIdx)) {
            removeLocalDeck(localIdx);
            return;
        }
        if (action === 'resume-draft') {
            location.href = 'editor.html';
            return;
        }
        if (action === 'drop-draft') {
            discardDraft();
        }
    });

    initTheme();
    renderExamples();
    renderDraftNotice();
    _localDecks = loadLocalDecks();
    renderLocalDecks();
</script>
</body>
</html>
